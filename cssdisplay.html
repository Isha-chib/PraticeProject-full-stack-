<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css display</title>
</head> 
<style>
   body{
    background-color: black;
   }
   h1{
    color:blueviolet;
   }
    .red{
        background-color: red;
        display:inline-block;
        height:200px;
        width:200px;
   
    }
    .blue{
        background-color:blue;
        display:inline-block;
        height:200px;
        width:200px;
    }
    .green{
        background-color:green;
        display:inline-block;
        height:200px;
        width:200px;
    }
    p{
        color:beige;
        text-align:center;
    }
</style>
<body>
    <h1><u><i>CSS DISPLAY PROPERTY </i></u></h1>
    <div class="red">
        <p><u><i>Red paragraph</i></u></p>
    </div>
        <div class="blue"><p><u><i>Blue paragraph</i></u></p>
        </div>
            <div class="green"><p><u><i>Green paragraph</i></u></p>
            </div>
</body>
</html>
